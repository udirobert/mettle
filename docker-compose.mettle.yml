name: mettle

services:
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      AGENT_PORT: "8123"
      METTLE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CHECKPOINT_DATABASE_URL: postgresql://mettle:${POSTGRES_PASSWORD}@mettle-postgres:5432/mettle
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8123"
    networks:
      - default
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.mettle-agent.entrypoints=https
      - traefik.http.routers.mettle-agent.rule=Host(`agent.mettle.persidian.com`)
      - traefik.http.routers.mettle-agent.tls.certresolver=letsencrypt
      - traefik.http.services.mettle-agent.loadbalancer.server.port=8123
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8123/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mettle
      POSTGRES_USER: mettle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - mettle-postgres-data:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - mettle-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mettle -d mettle"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mettle-postgres-data:

networks:
  coolify:
    external: true
